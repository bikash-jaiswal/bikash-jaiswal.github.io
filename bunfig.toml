[run]
bun = true

[install]
# Use exact versions from lockfile in CI
lockfile = true
# Cache node_modules for faster installs
cache = true
# Use exact versions for reproducible builds
exact = true

[test]
# Enable test coverage
coverage = true
# Preload test setup files
preload = []

[loader]
# Custom loaders for specific file types
# ".md": "bun-loader-markdown"

# Performance optimizations
[optimize]
# Enable dead code elimination
deadCodeElimination = true
# Enable constant folding
constantFolding = true

# Smol mode - reduces binary size for production builds
[smol]
enable = true

# JIT compilation - faster execution for hot paths
[jit]
enable = true
